# Sentinel AI — Railway Configuration
# Docs: https://docs.railway.com/reference/config

[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  startCommand = "node dist/index.js"
  healthcheckPath = "/"
  healthcheckTimeout = 10
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# Railway injects these automatically when you add a MySQL plugin:
#   MYSQL_URL, MYSQLHOST, MYSQLPORT, MYSQLUSER, MYSQLPASSWORD, MYSQLDATABASE
# We map them to DATABASE_URL in the start command or via Railway variables.
